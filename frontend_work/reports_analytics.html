<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics - HMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            box-shadow: var(--box-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: var(--border-radius);
            transition: background-color 0.3s;
            font-weight: 500;
        }

        nav a:hover, nav a.active {
            background-color: var(--secondary-color);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }

        h2, h3 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        h3 {
            font-size: 1.5rem;
            text-align: left;
            margin-top: 1.5rem;
            border-bottom: 2px solid var(--light-color);
            padding-bottom: 0.5rem;
        }

        .report-options, .report-output {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
            font-weight: 600;
        }

        .form-group select,
        .form-group input[type="date"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            font-size: 1rem;
            color: #555;
        }

        .form-group select {
            appearance: none;
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg fill="%23555" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>');
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        .report-options button[type="submit"] {
            padding: 0.75rem 1.5rem;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .report-options button[type="submit"]:hover {
            background-color: #2980b9;
        }

        #report-data {
            padding: 1rem;
            background-color: var(--light-color);
            border-radius: var(--border-radius);
            color: #555;
        }

        footer {
            background-color: var(--dark-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 3rem;
        }

        footer p {
            margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1><i class="fas fa-chart-bar"></i> HMS - Admin Portal</h1>
            <nav>
                <ul>
                    <li><a href="dashboard_admin.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="#"><i class="fas fa-user-md"></i> Manage Doctors</a></li>
                    <li><a href="#"><i class="fas fa-calendar-alt"></i> Appointments</a></li>
                    <li><a href="inventory_management.html"><i class="fas fa-cubes"></i> Inventory</a></li>
                    <li><a href="reports_analytics.html" class="active"><i class="fas fa-chart-line"></i> Reports</a></li>
                    <li><a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <h2>Reports & Analytics</h2>

        <section class="report-options">
            <h3>Generate Report</h3>
            <form action="#" method="GET">
                <div class="form-group">
                    <label for="report-type">Report Type</label>
                    <select id="report-type" name="report_type" required>
                        <option value="">Select Report</option>
                        <option value="patient-summary">Patient Summary</option>
                        <option value="appointment-summary">Appointment Summary</option>
                        <option value="billing-report">Billing Report</option>
                        <option value="inventory-status">Inventory Status</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="report-date-from">Date From (Optional)</label>
                    <input type="date" id="report-date-from" name="report_date_from">
                </div>
                <div class="form-group">
                    <label for="report-date-to">Date To (Optional)</label>
                    <input type="date" id="report-date-to" name="report_date_to">
                </div>
                <button type="submit">Generate</button>
            </form>
        </section>

        <section class="report-output" style="margin-top: 30px;">
            <h3>Report Output</h3>
            <div id="report-data">
                <p>Select a report type and date range to generate data.</p>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2025 Hospital Management System. Lahore, Punjab, Pakistan.</p>
    </footer>

</body>
</html>
