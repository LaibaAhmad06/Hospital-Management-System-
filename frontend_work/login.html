<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.6;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 2rem;
        }

        .login-box {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo h2 {
            color: var(--primary-color);
            font-size: 1.75rem;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--light-color);
            border-radius: var(--border-radius);
            font-size: 1rem;
            color: #555;
        }

        select {
            appearance: none;
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg fill="%23555" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>');
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1em;
        }

        button[type="submit"] {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 1rem;
        }

        button[type="submit"]:hover {
            background-color: #2980b9;
        }

        .links {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
        }

        .links a {
            color: var(--secondary-color);
            text-decoration: none;
            margin: 0 0.5rem;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        .error-message {
            color: var(--accent-color);
            font-size: 0.9rem;
            margin-top: 0.25rem;
            display: none;
        }

        footer {
            background-color: var(--dark-color);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        footer p {
            margin-bottom: 0.5rem;
        }

        @media (max-width: 768px) {
            .login-box {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <h2>Hospital Management System</h2>
            </div>

            <form id="loginForm" action="#" method="POST">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                    <div id="usernameError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <div id="passwordError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="role">Login As</label>
                    <select id="role" name="role" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <button type="submit">Login</button>

                <div class="links">
                    <a href="#" id="forgotPassword">Forgot password?</a>
                    <a href="#" id="register">Create account</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 Hospital Management System. Lahore, Punjab, Pakistan.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const forgotPasswordLink = document.getElementById('forgotPassword');
            const registerLink = document.getElementById('register');

            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();

                document.getElementById('usernameError').style.display = 'none';
                document.getElementById('passwordError').style.display = 'none';

                if (!usernameInput.value.trim()) {
                    showError('usernameError', 'Username or email is required');
                    return;
                }

                if (!passwordInput.value) {
                    showError('passwordError', 'Password is required');
                    return;
                }

                const roleSelect = document.getElementById('role');
                if (!roleSelect.value) {
                    alert('Please select your role');
                    return;
                }

                simulateAuthentication();
            });

            forgotPasswordLink.addEventListener('click', function(event) {
                event.preventDefault();
                alert('Password reset link will be sent to your registered email.');
            });

            registerLink.addEventListener('click', function(event) {
                event.preventDefault();
                alert('Redirecting to registration page.');
                // window.location.href = 'register.html';
            });

            function showError(elementId, message) {
                const errorElement = document.getElementById(elementId);
                errorElement.textContent = message;
                errorElement.style.display = 'block';
            }

            function simulateAuthentication() {
                const submitButton = loginForm.querySelector('button[type="submit"]');
                const originalButtonText = submitButton.textContent;
                submitButton.textContent = 'Authenticating...';
                submitButton.disabled = true;

                setTimeout(() => {
                    const selectedRole = document.getElementById('role').value;
                    let redirectURL = '';

                    switch (selectedRole) {
                        case 'admin':
                            redirectURL = 'dashboard_admin.html';
                            break;
                        case 'doctor':
                            redirectURL = 'dashboard_doctor.html';
                            break;
                        case 'patient':
                            redirectURL = 'dashboard_patient.html';
                            break;
                        default:
                            alert('Invalid role selected.');
                            submitButton.textContent = originalButtonText;
                            submitButton.disabled = false;
                            return;
                    }

                    window.location.href = redirectURL;

                }, 1500);
            }
        });
    </script>
</body>
</html>
